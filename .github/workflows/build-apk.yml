name: Generar APK de Alarmas Nativa

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar Código del Repositorio
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Configurar Android SDK
      uses: android-actions/setup-android@v3

    - name: Instalar Dependencias del Proyecto
      run: npm install

    - name: Inicializar Plataforma Android (Capacitor)
      run: |
        npx cap init "Mundial 26 Alarmas" "com.mundial26.alarmas.sv" --web-dir=www
        npx cap add android

    - name: Sincronizar Código e Instalar Plugin de Notificaciones
      run: npx cap sync android

    - name: Conceder permisos de ejecución al compilador de Android
      run: chmod +x android/gradlew

    - name: Compilar APK Nativa (Modo Debug de Prueba)
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Subir APK Generada como Artefacto de Descarga
      uses: actions/upload-artifact@v4
      with:
        name: Mundial26-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
